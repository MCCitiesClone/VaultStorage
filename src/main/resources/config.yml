# Default configuration for VaultStorage
# This file is copied to the plugin data folder on first run.

mysql:
  host: "localhost"
  port: 3306
  database: "vault_storage"
  user: "root"
  password: ""
  useSSL: false

# Automatically vault Bolt-locked containers when a Realty region changes occupant
# (bought/transferred or rented). A container is vaulted when its Bolt owner is not the
# new occupant and is not a WorldGuard owner/member of the region. Requires the Realty plugin.
auto-vault:
  enabled: true
  # Grace period (in server ticks, 20 = 1 second) between the occupant change and the sweep.
  delay-ticks: 1200

